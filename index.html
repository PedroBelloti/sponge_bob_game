<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fora do Cardume</title>
  <!-- Fontes do jogo (canvas + menu) — carregadas cedo para o texto do
       Phaser não renderizar com fallback no cold start -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Russo+One&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #030a1c;
    }

    #menu-container {
      width: 100%;
      height: 100%;
    }

    #game-container {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      z-index: 100;
    }
  </style>
</head>

<body>
  <div id="menu-container"></div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
